<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Invaders">
<meta name="theme-color" content="#05070f">
<title>Space Invaders</title>
<style>
  :root{
    --bg:#05070f; --ink:#e8f0ff; --dim:#7c8aa8; --accent:#39ff88;
    --accent2:#39a0ff; --danger:#ff4d6d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace;
    overscroll-behavior:none;touch-action:none}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center}
  canvas{display:block;background:#05070f;image-rendering:pixelated;
    touch-action:none}
  /* Overlays */
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:calc(env(safe-area-inset-top) + 24px) 28px calc(env(safe-area-inset-bottom) + 24px);
    background:radial-gradient(120% 120% at 50% 0%,rgba(57,160,255,.12),transparent 60%),rgba(5,7,15,.94);
    z-index:5;backdrop-filter:blur(2px)}
  .overlay.hidden{display:none}
  .title{font-size:34px;font-weight:800;letter-spacing:3px;
    color:var(--accent);text-shadow:0 0 18px rgba(57,255,136,.5);margin:0 0 4px}
  .sub{color:var(--dim);font-size:14px;letter-spacing:1px;margin:0 0 26px;line-height:1.6}
  .big{font-size:15px;color:var(--ink);margin:2px 0}
  .big b{color:var(--accent2)}
  .play{margin-top:28px;font-size:19px;font-weight:800;letter-spacing:2px;
    color:#05070f;background:var(--accent);border:none;border-radius:16px;
    padding:17px 46px;cursor:pointer;box-shadow:0 0 26px rgba(57,255,136,.45)}
  .play:active{transform:scale(.97)}
  .rules{color:var(--dim);font-size:13px;line-height:1.9;margin-top:26px;max-width:320px}
  .rules span{color:var(--accent)}
  .go-title{color:var(--danger);text-shadow:0 0 18px rgba(255,77,109,.5)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>

<div id="startScreen" class="overlay">
  <h1 class="title">SPACE&nbsp;INVADERS</h1>
  <p class="sub">DEFEND · EARTH</p>
  <div class="rules">
    <b style="color:var(--ink)">HOW TO PLAY</b><br>
    <span>Drag</span> anywhere to move your cannon<br>
    Auto-fire is on — just aim<br>
    <span>Tap</span> to fire an extra shot<br>
    Clear the fleet before it lands
  </div>
  <button class="play" id="startBtn">TAP&nbsp;TO&nbsp;PLAY</button>
</div>

<div id="overScreen" class="overlay hidden">
  <h1 class="title go-title" id="overTitle">GAME&nbsp;OVER</h1>
  <p class="sub" id="overSub">The fleet broke through</p>
  <div class="big">SCORE&nbsp; <b id="finalScore">0</b></div>
  <div class="big">BEST&nbsp;&nbsp; <b id="bestScore">0</b></div>
  <div class="big" id="waveReached" style="color:var(--dim)">Wave 1</div>
  <button class="play" id="restartBtn">PLAY&nbsp;AGAIN</button>
</div>

<script>
"use strict";
(function(){
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const startScreen = document.getElementById("startScreen");
  const overScreen  = document.getElementById("overScreen");

  // ---- Logical resolution (portrait). We scale to fit the device. ----
  const VW = 400;          // virtual width
  let   VH = 700;          // virtual height (recomputed to device aspect)
  let scale = 1, offX = 0, offY = 0, dpr = 1;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 3);
    const w = window.innerWidth, h = window.innerHeight;
    // Keep virtual width fixed at 400, let height match the screen aspect
    VH = Math.round(VW * (h / w));
    canvas.style.width  = w + "px";
    canvas.style.height = h + "px";
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    scale = (w * dpr) / VW;
    offX = 0; offY = 0;
    ctx.setTransform(scale, 0, 0, scale, offX, offY);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", ()=>setTimeout(resize,120));

  // ---- Game state ----
  const KEY = "si_best_v1";
  let best = parseInt(localStorage.getItem(KEY) || "0", 10) || 0;
  let state = "menu";      // menu | play | dead
  let score = 0, lives = 3, wave = 1;

  const player = { x: VW/2, y: 0, w: 30, h: 16, cool: 0, speed: 0 };
  let bullets = [];        // player shots  {x,y,vy}
  let bombs   = [];        // enemy shots    {x,y,vy}
  let invaders = [];       // {x,y,alive,type,row,col}
  let bunkers  = [];       // {x,y,cells:[[]]}
  let particles = [];      // {x,y,vx,vy,life,c}
  let ufo = null;          // bonus ship {x,vx,dir}

  // Fleet movement
  let fleetDir = 1, fleetStepDown = false, fleetShift = 0;
  let ufoTimer = 0;

  // Input
  let dragX = null, wantShot = false;

  // ---- Grid config ----
  const COLS = 8, ROWS = 5;
  const INV_W = 26, INV_H = 18, GAP_X = 12, GAP_Y = 14;

  function fleetSpeed(){
    const total = COLS*ROWS;
    const alive = invaders.filter(i=>i.alive).length || 1;
    // faster as fewer remain and as waves progress
    const base = 14 + (wave-1)*3;
    return base * (1 + (total - alive)/total * 2.2);
  }

  function newFleet(){
    invaders = [];
    const gridW = COLS*INV_W + (COLS-1)*GAP_X;
    const startX = (VW - gridW)/2;
    const startY = 90 + Math.min((wave-1)*10, 60);
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const type = r===0 ? 2 : (r<3 ? 1 : 0); // top rows worth more
        invaders.push({
          x: startX + c*(INV_W+GAP_X),
          y: startY + r*(INV_H+GAP_Y),
          w: INV_W, h: INV_H, alive:true, type, row:r, col:c
        });
      }
    }
    fleetDir = 1; fleetStepDown = false; fleetShift = 0;
  }

  function makeBunkers(){
    bunkers = [];
    const count = 4;
    const bw = 8, cols = 7, rows = 5; // cell grid
    const totalW = cols*bw;
    const spacing = VW / count;
    const by = VH - 150;
    for(let b=0;b<count;b++){
      const bx = spacing*b + (spacing-totalW)/2;
      const cells = [];
      for(let r=0;r<rows;r++){
        cells[r] = [];
        for(let c=0;c<cols;c++){
          // carve an arch at the bottom-center
          let solid = 1;
          if(r>=rows-2 && c>=2 && c<=cols-3) solid = 0;
          cells[r][c] = solid;
        }
      }
      bunkers.push({x:bx, y:by, cell:bw, cols, rows, cells});
    }
  }

  function resetGame(){
    score = 0; lives = 3; wave = 1;
    bullets = []; bombs = []; particles = []; ufo = null; ufoTimer = 6;
    player.x = VW/2; player.cool = 0;
    player.y = VH - 70;
    newFleet(); makeBunkers();
  }

  function startGame(){
    resize();
    resetGame();
    state = "play";
    startScreen.classList.add("hidden");
    overScreen.classList.add("hidden");
    lastT = 0;
    requestAnimationFrame(loop);
  }

  function gameOver(win){
    state = "dead";
    if(score > best){ best = score; localStorage.setItem(KEY, String(best)); }
    document.getElementById("finalScore").textContent = score;
    document.getElementById("bestScore").textContent = best;
    document.getElementById("waveReached").textContent = "Reached wave " + wave;
    document.getElementById("overTitle").innerHTML = win ? "YOU&nbsp;WIN" : "GAME&nbsp;OVER";
    document.getElementById("overTitle").style.color = win ? "var(--accent)" : "var(--danger)";
    document.getElementById("overSub").textContent = win ? "Fleet destroyed" : "The fleet broke through";
    overScreen.classList.remove("hidden");
  }

  // ---- Input handling ----
  function pointerFromEvent(e){
    const t = e.touches ? e.touches[0] : e;
    if(!t) return null;
    const rect = canvas.getBoundingClientRect();
    const px = (t.clientX - rect.left) / rect.width * VW;
    const py = (t.clientY - rect.top)  / rect.height * VH;
    return {px, py};
  }
  function onDown(e){
    e.preventDefault();
    const p = pointerFromEvent(e); if(!p) return;
    dragX = p.px;
    wantShot = true;
  }
  function onMove(e){
    e.preventDefault();
    const p = pointerFromEvent(e); if(!p) return;
    dragX = p.px;
  }
  function onUp(e){ e.preventDefault(); dragX = null; }

  canvas.addEventListener("touchstart", onDown, {passive:false});
  canvas.addEventListener("touchmove",  onMove, {passive:false});
  canvas.addEventListener("touchend",   onUp,   {passive:false});
  canvas.addEventListener("touchcancel",onUp,   {passive:false});
  canvas.addEventListener("mousedown", (e)=>{onDown(e); canvas._md=true;});
  canvas.addEventListener("mousemove", (e)=>{ if(canvas._md) onMove(e); });
  window.addEventListener("mouseup",   (e)=>{ canvas._md=false; onUp(e); });

  // Keyboard (desktop testing)
  const keys = {};
  window.addEventListener("keydown", e=>{ keys[e.key]=true;
    if(e.key===" "){ wantShot=true; e.preventDefault(); } });
  window.addEventListener("keyup",   e=>{ keys[e.key]=false; });

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("restartBtn").addEventListener("click", startGame);

  // ---- Helpers ----
  function rectHit(ax,ay,aw,ah, bx,by,bw,bh){
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }
  function burst(x,y,color,n){
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2, s = 20 + Math.random()*90;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
        life:0.4+Math.random()*0.4, max:0.8, c:color});
    }
  }

  function fireBullet(){
    bullets.push({x: player.x, y: player.y - player.h/2, vy: -420, w:3, h:12});
  }
  function dropBomb(inv){
    bombs.push({x: inv.x + inv.w/2, y: inv.y + inv.h, vy: 150 + wave*12, w:4, h:12});
  }

  function damageBunker(bx,by){
    for(const b of bunkers){
      if(bx < b.x || bx > b.x + b.cols*b.cell) continue;
      if(by < b.y || by > b.y + b.rows*b.cell) continue;
      const c = Math.floor((bx - b.x)/b.cell);
      const r = Math.floor((by - b.y)/b.cell);
      // damage a small blast radius
      let hitAny = false;
      for(let dr=-1;dr<=1;dr++){
        for(let dc=-1;dc<=1;dc++){
          const rr=r+dr, cc=c+dc;
          if(rr>=0&&rr<b.rows&&cc>=0&&cc<b.cols&&b.cells[rr][cc]){
            if(dr===0&&dc===0 || Math.random()<0.5){ b.cells[rr][cc]=0; hitAny=true; }
          }
        }
      }
      if(hitAny){ burst(bx,by,"#4a7", 5); return true; }
    }
    return false;
  }

  // ---- Update ----
  function update(dt){
    // ---- player movement ----
    if(dragX!=null){
      // ease toward finger for smooth control
      player.x += (dragX - player.x) * Math.min(1, dt*14);
    }
    if(keys["ArrowLeft"])  player.x -= 260*dt;
    if(keys["ArrowRight"]) player.x += 260*dt;
    player.x = Math.max(player.w/2, Math.min(VW - player.w/2, player.x));

    // ---- auto fire ----
    player.cool -= dt;
    if(player.cool <= 0){
      fireBullet();
      player.cool = 0.42; // auto-fire cadence
    }
    if(wantShot){ // manual tap = immediate extra shot
      if(player.cool > 0.12){ fireBullet(); player.cool = 0.16; }
      wantShot = false;
    }

    // ---- bullets ----
    for(const b of bullets){ b.y += b.vy*dt; }
    bullets = bullets.filter(b => b.y > -20);

    // ---- bombs ----
    for(const b of bombs){ b.y += b.vy*dt; }
    bombs = bombs.filter(b => b.y < VH + 20);

    // ---- fleet movement ----
    const spd = fleetSpeed();
    let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
    for(const inv of invaders){ if(!inv.alive) continue;
      minX = Math.min(minX, inv.x);
      maxX = Math.max(maxX, inv.x + inv.w);
      maxY = Math.max(maxY, inv.y + inv.h);
    }
    if(isFinite(minX)){
      if(fleetStepDown){
        for(const inv of invaders) inv.y += 14;
        fleetStepDown = false;
        fleetDir *= -1;
      } else {
        const dx = fleetDir * spd * dt;
        if((maxX + dx > VW-6 && fleetDir>0) || (minX + dx < 6 && fleetDir<0)){
          fleetStepDown = true;
        } else {
          for(const inv of invaders) inv.x += dx;
        }
      }
      // reached the player line?
      if(maxY >= player.y - player.h){ gameOver(false); return; }
    }

    // ---- enemy firing ----
    // pick random bottom-most invaders to shoot
    if(Math.random() < (0.9 + wave*0.15) * dt){
      const cols = {};
      for(const inv of invaders){ if(!inv.alive) continue;
        if(!cols[inv.col] || inv.y > cols[inv.col].y) cols[inv.col] = inv;
      }
      const shooters = Object.values(cols);
      if(shooters.length){ dropBomb(shooters[Math.floor(Math.random()*shooters.length)]); }
    }

    // ---- UFO ----
    ufoTimer -= dt;
    if(!ufo && ufoTimer <= 0){
      const dir = Math.random()<0.5?1:-1;
      ufo = {x: dir>0? -30 : VW+30, y: 60, dir, w:34, h:14};
      ufoTimer = 12 + Math.random()*12;
    }
    if(ufo){
      ufo.x += ufo.dir * 90 * dt;
      if(ufo.x < -50 || ufo.x > VW+50) ufo = null;
    }

    // ---- collisions: bullets vs invaders / ufo / bunkers ----
    for(const b of bullets){
      if(b.dead) continue;
      // ufo
      if(ufo && rectHit(b.x-1.5,b.y,3,12, ufo.x-ufo.w/2,ufo.y,ufo.w,ufo.h)){
        score += 100 + Math.floor(Math.random()*4)*50;
        burst(ufo.x,ufo.y+7,"#ff4d6d",22); ufo=null; b.dead=true; continue;
      }
      // invaders
      for(const inv of invaders){
        if(!inv.alive) continue;
        if(rectHit(b.x-1.5,b.y,3,12, inv.x,inv.y,inv.w,inv.h)){
          inv.alive=false; b.dead=true;
          score += (inv.type+1)*10;
          burst(inv.x+inv.w/2, inv.y+inv.h/2, invColor(inv.type), 12);
          break;
        }
      }
      if(b.dead) continue;
      // bunkers
      if(damageBunker(b.x, b.y)) b.dead=true;
    }
    bullets = bullets.filter(b=>!b.dead);

    // ---- collisions: bombs vs player / bunkers ----
    for(const b of bombs){
      if(b.dead) continue;
      if(damageBunker(b.x, b.y+b.h)){ b.dead=true; continue; }
      if(rectHit(b.x-2,b.y,4,12, player.x-player.w/2, player.y-player.h/2, player.w, player.h)){
        b.dead=true; hitPlayer();
      }
    }
    bombs = bombs.filter(b=>!b.dead);

    // ---- particles ----
    for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=140*dt; p.life-=dt; }
    particles = particles.filter(p=>p.life>0);

    // ---- wave cleared? ----
    if(state==="play" && !invaders.some(i=>i.alive)){
      wave++;
      if(wave > 99){ gameOver(true); return; }
      newFleet();
      bombs = [];
      // small breather + fresh bunkers every 2 waves
      if(wave % 2 === 1) makeBunkers();
      score += 50; // wave bonus
    }
  }

  function hitPlayer(){
    lives--;
    burst(player.x, player.y, "#39a0ff", 26);
    if(navigator.vibrate) navigator.vibrate(60);
    if(lives <= 0){ gameOver(false); return; }
    // brief respawn reset
    player.x = VW/2;
    bombs = [];
  }

  // ---- Rendering ----
  function invColor(type){ return type===2 ? "#39ff88" : type===1 ? "#ffd23f" : "#39a0ff"; }

  // pixel-art invader sprites (two frames), 11x8 grid
  const SPR = {
    a:[ // top type 2
      "00100000100","00010001000","00111111100","01101110110",
      "11111111111","10111111101","10100000101","00011011000"],
    b:[ // mid type 1
      "00011111000","01111111110","11111111111","11100100111",
      "11111111111","00111011100","01100000110","00011011000"],
    c:[ // bottom type 0
      "00000110000","00011111100","00111111110","01110110111",
      "01111111110","00001001000","00010110100","00101001010"]
  };
  function drawInvader(inv, frame){
    const grid = inv.type===2?SPR.a : inv.type===1?SPR.b : SPR.c;
    const px = inv.w/11;
    ctx.fillStyle = invColor(inv.type);
    for(let r=0;r<8;r++){
      const row = grid[r];
      for(let c=0;c<11;c++){
        if(row[c]==="1"){
          // little animation: shift alternate columns on frame
          const yy = inv.y + r*(inv.h/8);
          ctx.fillRect(inv.x + c*px, yy, px+0.5, inv.h/8 + 0.5);
        }
      }
    }
  }

  function drawPlayer(){
    const x = player.x, y = player.y, w = player.w, h = player.h;
    ctx.fillStyle = "#39ff88";
    // base
    ctx.fillRect(x - w/2, y + h/2 - 5, w, 5);
    ctx.fillRect(x - w/2 + 4, y + h/2 - 9, w - 8, 4);
    // turret
    ctx.fillRect(x - 3, y - h/2, 6, h);
    ctx.fillStyle = "#bfffdb";
    ctx.fillRect(x - 1.5, y - h/2 - 3, 3, 4);
  }

  function drawBunkers(){
    ctx.fillStyle = "#37c26a";
    for(const b of bunkers){
      for(let r=0;r<b.rows;r++){
        for(let c=0;c<b.cols;c++){
          if(b.cells[r][c]){
            ctx.fillRect(b.x + c*b.cell, b.y + r*b.cell, b.cell+0.5, b.cell+0.5);
          }
        }
      }
    }
  }

  function drawHUD(){
    ctx.fillStyle = "#e8f0ff";
    ctx.font = "700 15px -apple-system, monospace";
    ctx.textBaseline = "top";
    ctx.textAlign = "left";
    ctx.fillText("SCORE " + score, 10, 8 + safeTop());
    ctx.textAlign = "center";
    ctx.fillStyle = "#7c8aa8";
    ctx.fillText("WAVE " + wave, VW/2, 8 + safeTop());
    // lives
    ctx.textAlign = "right";
    ctx.fillStyle = "#39ff88";
    let lifeStr = "";
    for(let i=0;i<lives;i++) lifeStr += "▲ ";
    ctx.fillText(lifeStr.trim() || " ", VW-10, 8 + safeTop());
  }

  function safeTop(){
    // approximate the notch inset in virtual units
    const inset = parseFloat(getComputedStyle(document.documentElement)
      .getPropertyValue("--sat")) || 0;
    return inset;
  }

  let animФ = 0, frameClock = 0;
  function render(dt){
    frameClock += dt;
    const frame = Math.floor(frameClock*2) % 2;

    ctx.setTransform(scale,0,0,scale,offX,offY);
    ctx.clearRect(0,0,VW,VH);
    // starfield backdrop
    ctx.fillStyle = "#05070f";
    ctx.fillRect(0,0,VW,VH);
    drawStars();

    drawBunkers();

    for(const inv of invaders){ if(inv.alive) drawInvader(inv, frame); }

    if(ufo){
      ctx.fillStyle = "#ff4d6d";
      const {x,y,w,h}=ufo;
      ctx.fillRect(x-w/2, y+4, w, 5);
      ctx.fillRect(x-w/2+6, y, w-12, 5);
      ctx.fillStyle="#ffd0d8";
      ctx.fillRect(x-3,y+2,6,3);
    }

    drawPlayer();

    // bullets
    ctx.fillStyle = "#bfffdb";
    for(const b of bullets){ ctx.fillRect(b.x-1.5, b.y, 3, 12); }
    // bombs
    ctx.fillStyle = "#ff8fa3";
    for(const b of bombs){ ctx.fillRect(b.x-2, b.y, 4, 10); }

    // particles
    for(const p of particles){
      ctx.globalAlpha = Math.max(0, p.life / (p.max||0.8));
      ctx.fillStyle = p.c;
      ctx.fillRect(p.x-1.5, p.y-1.5, 3, 3);
    }
    ctx.globalAlpha = 1;

    drawHUD();
  }

  // starfield
  let stars = null;
  function drawStars(){
    if(!stars){
      stars = [];
      for(let i=0;i<48;i++){
        stars.push({x:Math.random()*VW, y:Math.random()*VH,
          s:Math.random()<0.8?1:2, tw:Math.random()});
      }
    }
    for(const st of stars){
      st.y += (st.s*6)*(1/60);
      if(st.y > VH){ st.y = 0; st.x = Math.random()*VW; }
      const a = 0.35 + 0.4*Math.sin((frameClock*2)+st.tw*6);
      ctx.globalAlpha = Math.max(0.15, a);
      ctx.fillStyle = "#9fb4dc";
      ctx.fillRect(st.x, st.y, st.s, st.s);
    }
    ctx.globalAlpha = 1;
  }

  // ---- Main loop ----
  let lastT = 0;
  function loop(t){
    if(state !== "play") return;
    if(!lastT) lastT = t;
    let dt = (t - lastT) / 1000;
    lastT = t;
    if(dt > 0.05) dt = 0.05; // clamp after tab-switch
    update(dt);
    if(state === "play"){ render(dt); requestAnimationFrame(loop); }
  }

  // Set --sat CSS var from safe-area for HUD offset
  function computeSafeInset(){
    const probe = document.createElement("div");
    probe.style.cssText = "position:fixed;top:0;left:0;height:env(safe-area-inset-top);width:0;";
    document.body.appendChild(probe);
    const px = probe.getBoundingClientRect().height;
    document.body.removeChild(probe);
    // convert device px to virtual units
    const virt = px / (window.innerWidth / VW);
    document.documentElement.style.setProperty("--sat", virt.toFixed(1));
  }

  // ---- Boot ----
  resize();
  computeSafeInset();
  window.addEventListener("resize", computeSafeInset);
  document.getElementById("bestScore").textContent = best;
  // draw a static menu backdrop
  (function menuFrame(){
    if(state!=="menu") return;
    ctx.setTransform(scale,0,0,scale,offX,offY);
    ctx.clearRect(0,0,VW,VH);
    ctx.fillStyle="#05070f"; ctx.fillRect(0,0,VW,VH);
    frameClock += 1/60; drawStars();
    requestAnimationFrame(menuFrame);
  })();
})();
</script>
</body>
</html>
